services:
  # Backend API + WebSocket Server
  - type: web
    name: ai-trading-platform-api
    runtime: node
    region: mumbai
    plan: starter
    buildCommand: cd server && npm install && ln -sf ../shared shared && npm run build
    startCommand: cd server && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGINS
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true

  # Frontend Static Site
  - type: static_site
    name: ai-trading-platform-client
    runtime: static
    region: mumbai
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: ./client/dist
    envVars:
      - key: VITE_API_URL
        value: https://ai-trading-platform-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true